
<link rel="stylesheet" href="phrhome.css">
<style>
/* local-preview-only: white page bg hides white cards */
body{background:#f1f5f9;}
.wb-comingsoon-card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 24px 80px rgba(13,27,62,.10),0 4px 20px rgba(13,27,62,.05);padding:64px 48px;text-align:center;max-width:680px;margin:0 auto 40px;position:relative;overflow:hidden;}
.wb-comingsoon-card::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.08) 0%,transparent 70%);top:-100px;right:-80px;pointer-events:none;}
.wb-comingsoon-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#3b82f6);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 8px 24px rgba(37,99,235,.25);position:relative;z-index:1;}
.wb-comingsoon-badge{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;color:#2563eb;font-size:11px;font-weight:700;letter-spacing:1px;padding:6px 16px;border-radius:100px;margin-bottom:20px;position:relative;z-index:1;}
.wb-soon-dot{width:6px;height:6px;border-radius:50%;background:#2563eb;animation:pulse-dot 1.4s ease-in-out infinite;}
.wb-comingsoon-title{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;color:#0d1b3e;letter-spacing:-.03em;margin-bottom:16px;position:relative;z-index:1;}
.wb-comingsoon-desc{font-size:.95rem;color:#374151;line-height:1.75;max-width:480px;margin:0 auto 32px;position:relative;z-index:1;}
.wb-comingsoon-cta{background:#2563eb;color:#fff;padding:14px 28px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:600;position:relative;z-index:1;}
@media(max-width:768px){.wb-comingsoon-card{padding:48px 24px;border-radius:18px;}.wb-comingsoon-title{font-size:1.3rem;}.wb-comingsoon-desc{font-size:.88rem;}}
</style>

<!-- PAGE HERO -->
<div class="wb-page-hero">
  <div class="wb-hero-inner">
    <div class="wb-hero-content">
      <div class="wb-hero-eyebrow">
        <span class="wb-hero-eyebrow-dot"></span>
        Live Webinars
      </div>
      <h1 class="wb-hero-title">Where Great HR Leaders<br><span>Come to Stay Ahead</span></h1>
      <p class="wb-hero-sub">Join HR leaders, people managers, and practitioners worldwide for deep-dives into workforce strategy, product updates, and what's next in HR tech.</p>
    </div>
    <div class="wb-hero-img-col">
      <img src="https://peopleshr.com/wp-content/uploads/2026/05/hero.webp" alt="" class="wb-hero-img">
    </div>
  </div>
</div>

<!-- BODY — sections injected by webinar-delta.js -->
<div class="wb-body" id="wb-body">
  <div class="wb-loading">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" class="wb-loading-spinner">
      <circle cx="20" cy="20" r="16" stroke="#e2e8f0" stroke-width="4"/>
      <path d="M20 4a16 16 0 0 1 16 16" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    </svg>
    Loading webinars…
  </div>
</div>
